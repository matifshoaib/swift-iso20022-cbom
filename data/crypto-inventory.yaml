# =====================================================================
# Cryptographic Inventory — Simulated SWIFT / ISO 20022 Wire-Payment Estate
# with Canadian domestic settlement endpoints (Lynx + Real-Time Rail)
# ---------------------------------------------------------------------
# Single source of truth. `scripts/generate_cbom.py` transforms this into
# a CycloneDX 1.6 Cryptography Bill of Materials (CBOM).
#
# This models a *representative* correspondent-banking wire estate plus two
# Canadian domestic settlement rails, NOT any real institution's config.
# All keys/certs are illustrative.
#
# Migration-priority model (Mosca-informed):
#   P1-CRITICAL  Harvest-Now-Decrypt-Later (HNDL): key establishment /
#                key transport protecting confidential data whose secrecy
#                must outlive Q-day (archived payments, PII, long retention).
#   P2-HIGH      Authentication / signing whose integrity guarantee must
#                hold at/after Q-day; driven by ITSM.40.001 high-priority
#                2031 milestone (SWIFT PKI, RTGS liquidity-transfer signing).
#   P3-MEDIUM    Protocol/version hygiene (TLS 1.2 -> 1.3), ECDSA in certs.
#   P4-MONITOR   Symmetric / hash primitives — Grover only; remediate by
#                parameter increase (AES-256, SHA-384), not replacement.
#
# Confidence model (evidence honesty — critical for public scrutiny):
#   DOCUMENTED   Stated in a primary/authoritative source (Payments Canada,
#                Bank of Canada, SWIFT, Cyber Centre, BIS).
#   INFERRED     Informed assumption from how the underlying platform
#                demonstrably works, where the system-specific value is not
#                public. `confidence_note` records exactly what is documented
#                vs inferred. INFERRED assets are NEVER presented as fact.
# =====================================================================

metadata:
  estate_name: "Wire-Payment Estate + Canadian Domestic Rails (Reference Model)"
  author: "Muhammad Atif — Payments PQC Migration Analysis"
  description: >
    Cryptographic dependency map across the cross-border wire-payment
    lifecycle (pain.001 -> orchestration -> sanctions screening -> SWIFT
    messaging MT103 / pacs.008 -> HSM signing -> RTGS settlement pacs.009 ->
    archive), extended with two Canadian domestic settlement endpoints:
    Lynx (Payments Canada RTGS, over SWIFTNet) and the Real-Time Rail (RTR,
    Payments Canada, ISO 20022 over JSON/REST). Each asset carries a
    DOCUMENTED / INFERRED confidence label.

# ---------------------------------------------------------------------
# ALGORITHMS
# ---------------------------------------------------------------------
algorithms:
  - ref: rsa-2048-pkcs1-sha256
    name: "RSA-2048-PKCS1v15-SHA256"
    primitive: signature
    algorithmFamily: RSASSA-PKCS1-v1_5
    parameterSetIdentifier: "2048"
    padding: pkcs1v15
    cryptoFunctions: [sign, verify]
    classicalSecurityLevel: 112
    nistQuantumSecurityLevel: 0
    oid: "1.2.840.113549.1.1.11"
    lifecycle_stage: "SWIFT messaging; RTGS settlement; PKI"
    touchpoint: "Message & liquidity-transfer signing"
    quantum_vulnerable: true
    threat: "Signature forgery once a CRQC exists (integrity/authenticity)"
    target: "ML-DSA-65 (FIPS 204)"
    hybrid_capable: true
    migration_priority: P2-HIGH
    confidence: DOCUMENTED
    confidence_note: "Reference-model signing primitive; RSA-2048 is quantum-vulnerable per NIST."

  - ref: rsa-2048-oaep
    name: "RSA-2048-OAEP"
    primitive: pke
    algorithmFamily: RSA-OAEP
    parameterSetIdentifier: "2048"
    padding: oaep
    cryptoFunctions: [encrypt, decrypt]
    classicalSecurityLevel: 112
    nistQuantumSecurityLevel: 0
    oid: "1.2.840.113549.1.1.7"
    lifecycle_stage: "Archive; key wrapping"
    touchpoint: "Wraps AES data-encryption keys for long-term archive"
    quantum_vulnerable: true
    threat: "Harvest-Now-Decrypt-Later on archived payment data & PII"
    target: "ML-KEM-768 (FIPS 203)"
    hybrid_capable: true
    migration_priority: P1-CRITICAL
    confidence: DOCUMENTED
    confidence_note: "Reference-model key transport; RSA-OAEP is quantum-vulnerable."

  - ref: ecdsa-p256
    name: "ECDSA-P256-SHA256"
    primitive: signature
    algorithmFamily: ECDSA
    curve: P-256
    cryptoFunctions: [sign, verify]
    classicalSecurityLevel: 128
    nistQuantumSecurityLevel: 0
    oid: "1.2.840.10045.4.3.2"
    lifecycle_stage: "TLS certificates; internal service mesh"
    touchpoint: "TLS server/client authentication"
    quantum_vulnerable: true
    threat: "Signature forgery / impersonation once a CRQC exists"
    target: "ML-DSA-65 (FIPS 204)"
    hybrid_capable: true
    migration_priority: P2-HIGH
    confidence: DOCUMENTED
    confidence_note: "Reference-model EC signature; quantum-vulnerable per NIST."

  - ref: ecdh-p256
    name: "ECDH-P256"
    primitive: key-agree
    algorithmFamily: ECDH
    curve: P-256
    cryptoFunctions: [keyderive]
    classicalSecurityLevel: 128
    nistQuantumSecurityLevel: 0
    oid: "1.2.840.10045.2.1"
    lifecycle_stage: "TLS 1.2 corporate channel; TLS 1.3 mesh"
    touchpoint: "TLS key establishment"
    quantum_vulnerable: true
    threat: "HNDL: recorded TLS sessions decrypted post-Q-day"
    target: "ML-KEM-768 (FIPS 203), hybrid X25519+ML-KEM"
    hybrid_capable: true
    migration_priority: P1-CRITICAL
    confidence: DOCUMENTED
    confidence_note: "Reference-model EC key agreement; HNDL-exposed."

  - ref: sha-256
    name: "SHA-256"
    primitive: hash
    algorithmFamily: SHA-2
    parameterSetIdentifier: "256"
    cryptoFunctions: [digest]
    classicalSecurityLevel: 128
    nistQuantumSecurityLevel: 2
    oid: "2.16.840.1.101.3.4.2.1"
    lifecycle_stage: "Ubiquitous (signatures, HMAC, integrity)"
    touchpoint: "Digest for signatures & MACs"
    quantum_vulnerable: false
    threat: "Grover only — collision resistance mildly reduced"
    target: "Retain; prefer SHA-384 for new high-assurance use"
    hybrid_capable: false
    migration_priority: P4-MONITOR
    confidence: DOCUMENTED
    confidence_note: "SHA-2 is standard across SWIFT/ISO 20022; Grover-only, quantum-resistant."

  - ref: aes-256-gcm
    name: "AES-256-GCM"
    primitive: ae
    algorithmFamily: AES
    parameterSetIdentifier: "256"
    mode: gcm
    cryptoFunctions: [keygen, encrypt, decrypt, tag]
    classicalSecurityLevel: 256
    nistQuantumSecurityLevel: 5
    oid: "2.16.840.1.101.3.4.1.46"
    lifecycle_stage: "Data-at-rest (TDE); archive; HSM master key"
    touchpoint: "Bulk data & key-wrapping encryption"
    quantum_vulnerable: false
    threat: "Grover halves effective strength -> still 128-bit; safe"
    target: "Retain at 256-bit"
    hybrid_capable: false
    migration_priority: P4-MONITOR
    confidence: DOCUMENTED
    confidence_note: "AES-256 is quantum-resistant (Grover halves to 128-bit)."

  - ref: hmac-sha256
    name: "HMAC-SHA-256"
    primitive: mac
    algorithmFamily: HMAC
    parameterSetIdentifier: "256"
    cryptoFunctions: [tag, verify]
    classicalSecurityLevel: 128
    nistQuantumSecurityLevel: 2
    oid: "1.2.840.113549.2.9"
    lifecycle_stage: "SWIFT Local Authentication (LAU)"
    touchpoint: "Integrity between back-office app and SWIFT interface"
    quantum_vulnerable: false
    threat: "Grover only — remains secure"
    target: "Retain"
    hybrid_capable: false
    migration_priority: P4-MONITOR
    confidence: DOCUMENTED
    confidence_note: "HMAC-SHA-256 (e.g., SWIFT LAU pattern); quantum-resistant."

  - ref: ml-dsa-65
    name: "ML-DSA-65"
    primitive: signature
    algorithmFamily: ML-DSA
    parameterSetIdentifier: "ML-DSA-65"
    cryptoFunctions: [sign, verify]
    classicalSecurityLevel: 192
    nistQuantumSecurityLevel: 3
    oid: "2.16.840.1.101.3.4.3.18"
    lifecycle_stage: "TARGET (state): replaces RSA/ECDSA signing"
    touchpoint: "PQC digital signature (FIPS 204)"
    quantum_vulnerable: false
    threat: "None known (lattice, Module-LWE/SIS)"
    target: "Deploy (hybrid with existing signer during transition)"
    hybrid_capable: true
    migration_priority: TARGET
    confidence: DOCUMENTED
    confidence_note: "NIST FIPS 204 standard; Cyber Centre ITSP.40.111 recommends ML-DSA."

  - ref: ml-kem-768
    name: "ML-KEM-768"
    primitive: kem
    algorithmFamily: ML-KEM
    parameterSetIdentifier: "ML-KEM-768"
    cryptoFunctions: [keygen, encapsulate, decapsulate]
    classicalSecurityLevel: 192
    nistQuantumSecurityLevel: 3
    oid: "2.16.840.1.101.3.4.4.2"
    lifecycle_stage: "TARGET (state): replaces ECDH/RSA key transport"
    touchpoint: "PQC key establishment (FIPS 203)"
    quantum_vulnerable: false
    threat: "None known (lattice, Module-LWE)"
    target: "Deploy hybrid X25519+ML-KEM-768"
    hybrid_capable: true
    migration_priority: TARGET
    confidence: DOCUMENTED
    confidence_note: "NIST FIPS 203 standard; Cyber Centre ITSP.40.111 recommends ML-KEM."

  # --- Canadian-rails algorithms ---
  - ref: rsa-4096-ca-root
    name: "RSA-4096 (SWIFTNet PKI CA Root)"
    primitive: signature
    algorithmFamily: RSASSA-PKCS1-v1_5
    parameterSetIdentifier: "4096"
    padding: pkcs1v15
    cryptoFunctions: [sign, verify]
    classicalSecurityLevel: 128
    nistQuantumSecurityLevel: 0
    oid: "1.2.840.113549.1.1.11"
    lifecycle_stage: "Lynx: SWIFTNet PKI trust anchor"
    touchpoint: "Root CA signing subscriber certificates"
    quantum_vulnerable: true
    threat: "Shor breaks RSA — CA compromise / trust-chain forgery"
    target: "ML-DSA-87 (long-lived root)"
    hybrid_capable: true
    migration_priority: P2-HIGH
    confidence: DOCUMENTED
    confidence_note: "SWIFT documents the SWIFTNet PKI CA root as 4096-bit RSA; managed by SWIFT, not the participant."

  - ref: ml-dsa-87
    name: "ML-DSA-87"
    primitive: signature
    algorithmFamily: ML-DSA
    parameterSetIdentifier: "ML-DSA-87"
    cryptoFunctions: [sign, verify]
    classicalSecurityLevel: 256
    nistQuantumSecurityLevel: 5
    oid: "2.16.840.1.101.3.4.3.19"
    lifecycle_stage: "TARGET (state): replaces long-lived RSA roots"
    touchpoint: "PQC signature for CA roots / long-lived trust anchors (FIPS 204)"
    quantum_vulnerable: false
    threat: "None known (lattice, Module-LWE/SIS)"
    target: "Deploy for CA roots and long-validity certificates"
    hybrid_capable: true
    migration_priority: TARGET
    confidence: DOCUMENTED
    confidence_note: "NIST FIPS 204 highest security category; appropriate for long-lived roots per ITSP.40.111."

  - ref: jws-rs256-es256
    name: "JWS Payload Signature (RS256 / ES256)"
    primitive: signature
    algorithmFamily: JWS
    parameterSetIdentifier: "RS256/ES256"
    cryptoFunctions: [sign, verify]
    classicalSecurityLevel: 112
    nistQuantumSecurityLevel: 0
    oid: "1.2.840.113549.1.1.11"
    lifecycle_stage: "RTR: API payload signing over ISO 20022 JSON"
    touchpoint: "Digitally signs RTR REST payloads (pacs.008)"
    quantum_vulnerable: true
    threat: "Shor breaks the underlying RSA/ECDSA signing key — payload forgery"
    target: "ML-DSA-65 (or composite ML-DSA + ECDSA)"
    hybrid_capable: true
    migration_priority: P2-HIGH
    confidence: INFERRED
    confidence_note: "RTR Participation Guide (Oct 2025) states payloads must be 'encrypted, digitally signed and validated', but the specific JWS algorithm (RS256/ES256) is NOT public — it sits in the participant-only RTR Exchange API spec."

# ---------------------------------------------------------------------
# PROTOCOLS
# ---------------------------------------------------------------------
protocols:
  - ref: tls-1-2-corporate
    name: "TLSv1.2 (Corporate Channel)"
    type: tls
    version: "1.2"
    lifecycle_stage: "Payment initiation (pain.001 ingress)"
    touchpoint: "Corporate-to-bank host-to-host / API channel"
    cipher_suites:
      - name: "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384"
        algorithms: [ecdh-p256, rsa-2048-pkcs1-sha256, aes-256-gcm, sha-256]
    quantum_vulnerable: true
    threat: "HNDL via ECDHE; legacy version also lacks modern hygiene"
    target: "TLS 1.3 + hybrid X25519+ML-KEM-768"
    hybrid_capable: true
    migration_priority: P3-MEDIUM
    confidence: DOCUMENTED
    confidence_note: "Reference-model legacy corporate channel."

  - ref: tls-1-3-mesh
    name: "TLSv1.3 (Internal Service Mesh)"
    type: tls
    version: "1.3"
    lifecycle_stage: "Orchestration; screening; internal APIs"
    touchpoint: "mTLS between payment microservices"
    cipher_suites:
      - name: "TLS_AES_256_GCM_SHA384"
        algorithms: [ecdh-p256, aes-256-gcm, sha-256]
    quantum_vulnerable: true
    threat: "HNDL via ECDHE key establishment"
    target: "Hybrid X25519+ML-KEM-768 key exchange"
    hybrid_capable: true
    migration_priority: P1-CRITICAL
    confidence: DOCUMENTED
    confidence_note: "Reference-model internal mesh; standard TLS 1.3 configuration."

  # --- Lynx transport (SWIFT Alliance Connect) ---
  - ref: lynx-ipsec-vpn
    name: "Lynx Transport — IPsec VPN (SWIFT Alliance Connect)"
    type: ipsec
    version: "IKEv2"
    lifecycle_stage: "Lynx: SWIFTNet transport over Secure IP Network"
    touchpoint: "Carries Lynx MX messages (pacs.008/009) over SWIFTNet InterAct"
    cipher_suites:
      - name: "IPsec IKEv2 (RSA-2048 auth, ECDH/DH, AES-256)"
        algorithms: [ecdh-p256, rsa-2048-pkcs1-sha256, aes-256-gcm, sha-256]
    quantum_vulnerable: true
    threat: "HNDL on ECDH/RSA key establishment; AES-256 bulk cipher is quantum-safe"
    target: "ML-KEM-768 hybrid key establishment (retain AES-256)"
    hybrid_capable: true
    migration_priority: P2-HIGH
    confidence: DOCUMENTED
    confidence_note: "SWIFT documents Alliance Connect IPsec with AES + RSA-2048 auth over the Secure IP Network; exact negotiated cipher suite for a given Lynx participant is INFERRED."

  - ref: lynx-tls-gui
    name: "Lynx Web Client / GUI — TLS 1.2/1.3"
    type: tls
    version: "1.2/1.3"
    lifecycle_stage: "Lynx: operator / administrative access"
    touchpoint: "Browser access to Lynx operational GUI"
    cipher_suites:
      - name: "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384"
        algorithms: [ecdh-p256, rsa-2048-pkcs1-sha256, aes-256-gcm, sha-256]
    quantum_vulnerable: true
    threat: "HNDL on handshake key exchange & certificate authentication"
    target: "ML-KEM-768 hybrid key exchange + ML-DSA certs"
    hybrid_capable: true
    migration_priority: P3-MEDIUM
    confidence: INFERRED
    confidence_note: "TLS for the admin GUI is standard practice; specific version/cipher suite is not published by Payments Canada."

  # --- RTR transport & access ---
  - ref: rtr-ipsec-vpn
    name: "RTR Transport — IPsec Site-to-Site VPN"
    type: ipsec
    version: "IKEv2"
    lifecycle_stage: "RTR: participant-to-Exchange connectivity"
    touchpoint: "Carries RTR REST/JSON payment exchange traffic"
    cipher_suites:
      - name: "IPsec site-to-site tunnel (RSA/ECDH auth, AES bulk)"
        algorithms: [ecdh-p256, rsa-2048-pkcs1-sha256, aes-256-gcm, sha-256]
    quantum_vulnerable: true
    threat: "HNDL on key establishment; AES bulk cipher quantum-safe"
    target: "ML-KEM-768 hybrid"
    hybrid_capable: true
    migration_priority: P2-HIGH
    confidence: DOCUMENTED
    confidence_note: "RTR Participation Guide confirms payment-exchange APIs run over a site-to-site VPN / IPsec tunnel; the negotiated cipher suite is INFERRED."

  - ref: rtr-tls-oauth
    name: "RTR Portal / API — TLS + OAuth 2.0 (IDAM)"
    type: tls
    version: "1.2+"
    lifecycle_stage: "RTR: portal access & token-based API authorization"
    touchpoint: "HTTPS portal + OAuth 2.0 token-authorized APIs via IDAM"
    cipher_suites:
      - name: "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384"
        algorithms: [ecdh-p256, rsa-2048-pkcs1-sha256, aes-256-gcm, sha-256]
    quantum_vulnerable: true
    threat: "HNDL on TLS key exchange; OAuth token-signing keys (likely RSA/ECDSA) quantum-vulnerable"
    target: "ML-KEM hybrid TLS + ML-DSA token signing"
    hybrid_capable: true
    migration_priority: P3-MEDIUM
    confidence: INFERRED
    confidence_note: "DOCUMENTED that RTR uses TLS/HTTPS, OAuth 2.0 'where possible', and IDAM tokens; TLS version and token-signing algorithm are INFERRED."

  - ref: rtr-sftp-ssh
    name: "RTR Reporting — SFTP over SSH (public-key auth)"
    type: ssh
    version: "SSH-2"
    lifecycle_stage: "RTR: report retrieval"
    touchpoint: "SFTP channel for participant reporting"
    cipher_suites:
      - name: "SSH-2 (public-key auth, ECDH kex, AES)"
        algorithms: [ecdh-p256, ecdsa-p256, aes-256-gcm, sha-256]
    quantum_vulnerable: true
    threat: "SSH host/user keys (RSA/ECDSA/Ed25519) quantum-vulnerable; HNDL on SSH kex"
    target: "PQC SSH — ML-KEM key exchange, ML-DSA host keys"
    hybrid_capable: true
    migration_priority: P3-MEDIUM
    confidence: DOCUMENTED
    confidence_note: "RTR Participation Guide states SFTP reporting requires SSH public-key authentication; specific key algorithm is INFERRED."

# ---------------------------------------------------------------------
