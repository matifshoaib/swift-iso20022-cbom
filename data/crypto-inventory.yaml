    name: "SWIFT PKI End-Entity Certificate"
    subjectName: "CN=paymentbank-swift-signing"
    issuerName: "CN=SWIFT PKI Certification Authority"
    signatureAlgorithmRef: rsa-2048-pkcs1-sha256
    subjectPublicKeyRef: rsa-2048-signing-key
    certificateFormat: "X.509"
    notValidBefore: "2024-01-01T00:00:00Z"
    notValidAfter: "2027-01-01T00:00:00Z"
    lifecycle_stage: "SWIFT messaging gateway"
    touchpoint: "Signs SWIFTNet InterAct / FIN messages"
    quantum_vulnerable: true
    threat: "RSA-2048 subject key & signature both quantum-vulnerable"
    target: "Re-issue on ML-DSA-65; hybrid cert during transition"
    hybrid_capable: true
    migration_priority: P2-HIGH
    confidence: DOCUMENTED
    confidence_note: "SWIFTNet subscriber certificates are 2048-bit RSA (SWIFT PKI)."

  - ref: corporate-tls-client-cert
    name: "Corporate Client TLS Certificate"
    subjectName: "CN=corporate-treasury-client"
    issuerName: "CN=Bank Internal Issuing CA"
