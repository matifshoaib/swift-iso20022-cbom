  # --- Lynx SWIFTNet PKI business certificate ---
  - ref: lynx-swiftnet-cert
    name: "Lynx SWIFTNet PKI Business Certificate"
    subjectName: "CN=paymentbank-lynx-ca-domestic"
    issuerName: "CN=SWIFT PKI Certification Authority"
    signatureAlgorithmRef: rsa-2048-pkcs1-sha256
    subjectPublicKeyRef: lynx-signing-key
    certificateFormat: "X.509"
    notValidBefore: "2024-01-01T00:00:00Z"
    notValidAfter: "2027-01-01T00:00:00Z"
    lifecycle_stage: "Lynx: CAD domestic RTGS message signing"
    touchpoint: "Signs Lynx pacs.008 / pacs.009 / pacs.004 over SWIFTNet InterAct"
    quantum_vulnerable: true
    threat: "RSA-2048 subject key & signature both quantum-vulnerable"
    target: "Re-issue on ML-DSA-65; hybrid cert during transition"
    hybrid_capable: true
    migration_priority: P2-HIGH
    confidence: DOCUMENTED
    confidence_note: "SWIFTNet subscriber certificates are 2048-bit RSA (SWIFT PKI). That this Lynx participant uses a standard SWIFTNet business certificate is INFERRED from Lynx running over SWIFTNet InterAct."

