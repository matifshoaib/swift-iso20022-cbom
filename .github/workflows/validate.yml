name: validate-cbom

on:
  push:
    paths: ["data/**", "scripts/**", "cbom/**", ".github/workflows/**"]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Verify CBOM is in sync with the inventory
        run: python scripts/generate_cbom.py --check
      - name: Structural validation + risk rollup
        run: python scripts/validate_cbom.py cbom/payment-estate-cbom.json
