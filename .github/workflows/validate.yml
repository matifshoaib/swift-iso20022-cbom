name: validate-cbom

on:
  push:
    paths: ["data/**", "scripts/**", "cbom/**", ".github/workflows/**"]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Regenerate CBOM from source inventory
        run: python scripts/generate_cbom.py --inventory data/crypto-inventory.yaml --out cbom/payment-estate-cbom.json
      - name: Fail if CBOM is out of sync with inventory
        run: |
          if ! git diff --quiet cbom/payment-estate-cbom.json; then
            echo "::error::cbom/payment-estate-cbom.json is stale. Run generate_cbom.py and commit."
            git --no-pager diff cbom/payment-estate-cbom.json
            exit 1
          fi
      - name: Structural validation + risk rollup
        run: python scripts/validate_cbom.py cbom/payment-estate-cbom.json
